<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallz.gg - Wall Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧱 Wallz.gg</h1>
            <div class="score-board">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="high-score">High Score: <span id="highScore">0</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> or <strong>A/D</strong> to move</p>
            <p>Avoid the red walls and collect blue blocks!</p>
            <button id="startBtn" class="btn">Start Game</button>
            <button id="pauseBtn" class="btn" style="display:none;">Pause</button>
            <button id="resumeBtn" class="btn" style="display:none;">Resume</button>
        </div>
        
        <div id="gameOver" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>Your Score: <span id="finalScore">0</span></p>
                <button id="restartBtn" class="btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
